<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="411px" preserveAspectRatio="none" style="width:921px;height:411px;background:#FFFFFF;" version="1.1" viewBox="0 0 921 411" width="921px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="234" x="342.125" y="32.9951">PR Cases - 2-way comparison</text><ellipse cx="408.25" cy="57.2969" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1.0;"/><path d="M572.25,77.2969 L572.25,100.9961 L552.25,104.9961 L572.25,108.9961 L572.25,132.6953 A0,0 0 0 0 572.25,132.6953 L909.25,132.6953 A0,0 0 0 0 909.25,132.6953 L909.25,87.2969 L899.25,77.2969 L572.25,77.2969 A0,0 0 0 0 572.25,77.2969 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M899.25,77.2969 L899.25,87.2969 L909.25,87.2969 L899.25,77.2969 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="316" x="578.25" y="94.3638">Used when only one side changed vs merge base</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="282" x="578.25" y="109.4966">(typically: source-only), or when merge base</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="253" x="578.25" y="124.6294">is unavailable and we fall back to 2-way.</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="288" x="264.25" y="88.0117"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="268" x="274.25" y="109.1504">Case: 2-way comparison (target vs source)</text><polygon fill="#F1F1F1" points="279.25,152.6953,537.25,152.6953,549.25,164.6953,537.25,176.6953,279.25,176.6953,267.25,164.6953,279.25,152.6953" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="258" x="279.25" y="168.5034">Syntactic difference between loaded models?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="14" x="253.25" y="162.1011">no</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="20" x="549.25" y="162.1011">yes</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="348" x="37" y="186.6953"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="328" x="47" y="207.834">Case: textual-only change (text differs, model equal)</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="400" x="11" y="240.6641"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="380" x="21" y="261.8027">Report outcome: relevant file but no syntactic model change</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="208" x="501.5" y="186.6953"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="188" x="511.5" y="207.834">Case: syntactic model change</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="349" x="431" y="240.6641"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="329" x="441" y="261.8027">Report outcome: syntactic changes without conflicts</text><polygon fill="#F1F1F1" points="408.25,280.6328,420.25,292.6328,408.25,304.6328,396.25,292.6328,408.25,280.6328" style="stroke:#181818;stroke-width:0.5;"/><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-w