<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="429px" preserveAspectRatio="none" style="width:851px;height:429px;background:#FFFFFF;" version="1.1" viewBox="0 0 851 429" width="851px" zoomAndPan="magnify"><title>PR Cases - 2-way comparison</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="199.9612" x="324.1526" y="34.9659">PR Cases - 2-way comparison</text></g><ellipse cx="369.2743" cy="60.0679" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><path d="M517.7452,80.0679 L517.7452,107.6269 L497.7452,111.6269 L517.7452,115.6269 L517.7452,143.186 A0,0 0 0 0 517.7452,143.186 L839.2664,143.186 A0,0 0 0 0 839.2664,143.186 L839.2664,90.0679 L829.2664,80.0679 L517.7452,80.0679 A0,0 0 0 0 517.7452,80.0679" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M829.2664,80.0679 L829.2664,90.0679 L839.2664,90.0679 L829.2664,80.0679" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="300.5213" x="523.7452" y="98.9649">Used when only one side changed vs merge base</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="268.2292" x="523.7452" y="116.6709">(typically: source-only), or when merge base</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="242.8012" x="523.7452" y="134.377">is unavailable and we fall back to 2-way.</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="256.9417" x="240.8035" y="93.4549"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="236.9417" x="250.8035" y="116.283">Case: 2-way comparison (target vs source)</text><polygon fill="#F1F1F1" points="252.8841,163.186,485.6645,163.186,497.6645,175.186,485.6645,187.186,252.8841,187.186,240.8841,175.186,252.8841,163.186" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="232.7803" x="252.8841" y="179.4539">Syntactic difference between loaded models?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="13.4529" x="227.4313" y="171.963">no</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.0829" x="497.6645" y="171.963">yes</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="312.5381" x="34.6822" y="197.186"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="292.5381" x="44.6822" y="220.0141">Case: textual-only change (text differs, model equal)</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="359.9024" x="11" y="253.5301"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="339.9024" x="21" y="276.3582">Report outcome: relevant file but no syntactic model change</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="185.9012" x="454.6468" y="197.186"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="165.9012" x="464.6468" y="220.0141">Case: syntactic model change</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="313.39" x="390.9024" y="253.5301"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="293.39" x="400.9024" y="276.3582">Report outcome: syntactic changes without conflicts</text><polygon fill="#F1F1F1" points="369.2743,295.8742,381.2743,307.8742,369.2743,319.8742,357.2743,307.8742,369.2743,295.8742" style="stroke:#181818;stroke-width:0.5;"/><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="216.6214" x="260.9636" y="339.8742"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="196.6214" x="270.9636" y="362.7023">New report posted as PR comment</text><ellipse cx="369.2743" cy="407.2183" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="369.2743" cy="407.2183" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="369.2743" x2="369.2743" y1="70.0679" y2="93.4549"/><polygon fill="#181818" points="365.2743,83.4549,369.2743,93.4549,373.2743,83.4549,369.2743,87.4549" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="190.9512" x2="190.9512" y1="233.5301" y2="253.5301"/><polygon fill="#181818" points="186.9512,243.5301,190.9512,253.5301,194.9512,243.5301,190.9512,247.5301" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="547.5974" x2="547.5974" y1="233.5301" y2="253.5301"/><polygon fill="#181818" points="543.5974,243.5301,547.5974,253.5301,551.5974,243.5301,547.5974,247.5301" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="240.8841" x2="190.9512" y1="175.186" y2="175.186"/><line style="stroke:#181818;stroke-width:1;" x1="190.9512" x2="190.9512" y1="175.186" y2="197.186"/><polygon fill="#181818" points="186.9512,187.186,190.9512,197.186,194.9512,187.186,190.9512,191.186" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="497.6645" x2="547.5974" y1="175.186" y2="175.186"/><line style="stroke:#181818;stroke-width:1;" x1="547.5974" x2="547.5974" y1="175.186" y2="197.186"/><polygon fill="#181818" points="543.5974,187.186