<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="623px" preserveAspectRatio="none" style="width:1107px;height:623px;background:#FFFFFF;" version="1.1" viewBox="0 0 1107 623" width="1107px" zoomAndPan="magnify"><title>PR Cases - 3-way comparison</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="199.9612" x="452.4608" y="34.9659">PR Cases - 3-way comparison</text></g><ellipse cx="463.4989" cy="60.0679" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><path d="M625.8658,80.0679 L625.8658,116.4799 L605.8658,120.4799 L625.8658,124.4799 L625.8658,160.892 A0,0 0 0 0 625.8658,160.892 L1002.3251,160.892 A0,0 0 0 0 1002.3251,160.892 L1002.3251,90.0679 L992.3251,80.0679 L625.8658,80.0679 A0,0 0 0 0 625.8658,80.0679" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M992.3251,80.0679 L992.3251,90.0679 L1002.3251,90.0679 L992.3251,80.0679" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="87.7111" x="631.8658" y="98.9649">Preconditions:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="244.0882" x="631.8658" y="116.6709">- source changed vs merge base (origin)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="240.3962" x="631.8658" y="134.377">- target changed vs merge base (origin)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="355.4593" x="631.8658" y="152.083">So two-sided edits are possible and conflict checks matter.</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="284.7339" x="321.1319" y="102.3079"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="264.7339" x="331.1319" y="125.136">Case: 3-way comparison (origin, target, source)</text><polygon fill="#F1F1F1" points="339.3318,180.892,587.666,180.892,599.666,192.892,587.666,204.892,339.3318,204.892,327.3318,192.892,339.3318,180.892" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="248.3342" x="339.3318" y="197.16">Syntactic difference between target and source?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="13.4529" x="313.8789" y="189.669">no</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.0829" x="599.666" y="189.669">yes</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="312.5381" x="34.6822" y="214.892"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="292.5381" x="44.6822" y="237.7201">Case: textual-only change (text differs, model equal)</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="359.9024" x="11" y="271.2361"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="339.9024" x="21" y="294.0642">Report outcome: relevant file but no syntactic model change</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="185.9012" x="643.096" y="214.892"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="165.9012" x="653.096" y="237.7201">Case: syntactic model change</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="354.9703" x="558.5614" y="271.2361"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="334.9703" x="568.5614" y="294.0642">Compute 3-way comparison (origin-&gt;target, origin-&gt;source)</text><polygon fill="#F1F1F1" points="690.5288,327.5802,781.5642,327.5802,793.5642,339.5802,781.5642,351.5802,690.5288,351.5802,678.5288,339.5802,690.5288,327.5802" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="91.0354" x="690.5288" y="343.8482">Syntactic conflict?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.0829" x="661.446" y="336.3572">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="13.4529" x="793.5642" y="336.3572">no</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="146.4329" x="483.835" y="361.5802"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="126.4329" x="493.835" y="384.4083">Case: syntactic conflict</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="312.2981" x="400.9024" y="417.9243"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="292.2981" x="410.9024" y="440.7524">Report outcome: side-by-side changes with conflicts</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="111.8127" x="859.1353" y="361.5802"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="91.8127" x="869.1353" y="384.4083">Case: no conflict</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="363.6823" x="733.2005" y="417.9243"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="343.6823" x="743.2005" y="440.7524">Report outcome: two-way syntactic changes without conflicts</text><polygon fill="#F1F1F1" points="736.0465,460.2684,748.0465,472.2684,736.0465,484.2684,724.0465,472.2684,736.0465,460.2684" style="stroke:#181818;stroke-width:0.5;"/><polygon fill="#F1F1F1" points="463.4989,490.2684,475.4989,502.2684,463.4989,514.2684,451.4989,502.2684,463.4989,490.2684" style="stroke:#181818;stroke-width:0.5;"/><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="216.6214" x="355.1881" y="534.2684"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="196.6214" x="365.1881" y="557.0965">New report posted as PR comment</text><ellipse cx="463.4989" cy="601.6126" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="463.4989" cy="601.6126" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="463.4989" x2="463.4989" y1="70.0679" y2="102.3079"/><polygon fill="#181818" points="459.4989,92.3079,463.4989,102.3079,467.4989,92.3079,463.4989,96.3079" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="190.9512" x2="190.9512" y1="251.2361" y2="271.2361"/><polygon fill="#181818" points="186.9512,261.2361,190.9512,271.2361,194.9512,261.2361,190.9512,265.2361" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="736.0465" x2="736.0465" y1="251.2361" y2="271.2361"/><polygon fill="#181818" points="732.0465,261.2361,736.0465,271.2361,740.0465,261.2361,736.0465,265.2361" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="557.0514" x2="557.0514" y1="397.9243" y2="417.9243"/><polygon fill="#181818" points="553.0514,407.9243,557.0514,417.9243,561.0514,407.9243,557.0514,411.9243" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="915.0416" x2="915.0416" y1="