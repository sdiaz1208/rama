<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="598px" preserveAspectRatio="none" style="width:1220px;height:598px;background:#FFFFFF;" version="1.1" viewBox="0 0 1220 598" width="1220px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="234" x="491.5" y="32.9951">PR Cases - 3-way comparison</text><ellipse cx="511" cy="57.2969" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1.0;"/><path d="M690,77.2969 L690,108.5625 L670,112.5625 L690,116.5625 L690,147.8281 A0,0 0 0 0 690,147.8281 L1086,147.8281 A0,0 0 0 0 1086,147.8281 L1086,87.2969 L1076,77.2969 L690,77.2969 A0,0 0 0 0 690,77.2969 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1076,77.2969 L1076,87.2969 L1086,87.2969 L1076,77.2969 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="90" x="696" y="94.3638">Preconditions:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259" x="696" y="109.4966">- source changed vs merge base (origin)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="255" x="696" y="124.6294">- target changed vs merge base (origin)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="375" x="696" y="139.7622">So two-sided edits are possible and conflict checks matter.</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="318" x="352" y="95.5781"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="298" x="362" y="116.7168">Case: 3-way comparison (origin, target, source)</text><polygon fill="#F1F1F1" points="373,167.8281,649,167.8281,661,179.8281,649,191.8281,373,191.8281,361,179.8281,373,167.8281" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="276" x="373" y="183.6362">Syntactic difference between target and source?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="14" x="347" y="177.2339">no</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="20" x="661" y="177.2339">yes</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="348" x="37" y="201.8281"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="328" x="47" y="222.9668">Case: textual-only change (text differs, model equal)</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="400" x="11" y="255.7969"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="380" x="21" y="276.9355">Report outcome: relevant file but no syntactic model change</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="208" x="707" y="201.8281"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="188" x="717" y="222.9668">Case: syntactic model change</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="394" x="614" y="255.7969"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="374" x="624" y="276.9355">Compute 3-way comparison (origin-&gt;target, origin-&gt;source)</text><polygon fill="#F1F1F1" points="760.5,309.7656,861.5,309.7656,873.5,321.7656,861.5,333.7656,760.5,333.7656,748.5,321.7656,760.5,309.7656" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="101" x="760.5" y="325.5737">Syntactic conflict?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="20" x="728.5" y="319.1714">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="14" x="873.5" y="319.1714">no</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="164" x="532" y="343.7656"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="144" x="542" y="364.9043">Case: syntactic conflict</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="346" x="441" y="397.7344"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="326" x="451" y="418.873">Report outcome: side-by-side changes with conflicts</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="124" x="946" y="343.7656"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="104" x="956" y="364.9043">Case: no conflict</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="402" x="807" y="397.7344"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="382" x="817" y="418.873">Report outcome: two-way syntactic changes without conflicts</text><polygon fill="#F1F1F1" points="811,437.7031,823,449.7031,811,461.7031,799,449.7031,811,437.7031" style="stroke:#181818;stroke-width:0.5;"/><polygon fill="#F1F1F1" points="511,467.7031,523,479.7031,511,491.7031,499,479.7031,511,467.7031" style="stroke:#181818;stroke-width:0.5;"/><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-wi